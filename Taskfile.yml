version: '3'

dotenv: ['.env']

vars:
  VERSION:
    sh: git describe --tags --always --dirty 2>/dev/null || echo "dev"
  COMMIT:
    sh: git rev-parse --short HEAD 2>/dev/null || echo "unknown"
  BUILD_DATE:
    sh: date -u +%Y-%m-%dT%H:%M:%SZ
  VERSION_PKG: github.com/zombiekit/brains/internal/version
  LDFLAGS: -s -w -X {{.VERSION_PKG}}.version={{.VERSION}} -X {{.VERSION_PKG}}.commit={{.COMMIT}} -X {{.VERSION_PKG}}.buildDate={{.BUILD_DATE}}

tasks:
  default:
    desc: List available tasks
    silent: true
    cmds:
      - task --list

  dev:
    desc: Run development tasks (use `task dev -- --list` to see all)
    cmds:
      - task --taskfile Taskfile.dev.yml {{.CLI_ARGS}}

  setup:
    desc: Set up development environment
    cmds:
      - task --taskfile Taskfile.dev.yml setup

  build:
    desc: Build the brains CLI binary
    cmds:
      - mkdir -p bin
      - go build -ldflags "{{.LDFLAGS}}" -o bin/brains ./cmd/brains
    sources:
      - "**/*.go"
      - go.mod
      - go.sum
    generates:
      - bin/brains

  install:
    desc: Build and install brains to GOBIN with bs symlink
    deps: [build]
    vars:
      INSTALL_DIR:
        sh: go env GOBIN || echo "$HOME/go/bin"
    cmds:
      - |
        echo "Installing brains to {{.INSTALL_DIR}}..."
        mkdir -p {{.INSTALL_DIR}}
        if ! cp bin/brains {{.INSTALL_DIR}}/brains; then
          echo "ERROR: Failed to copy brains to {{.INSTALL_DIR}}"
          exit 1
        fi
        cd {{.INSTALL_DIR}} && ln -sf brains bs
        echo ""
        echo "Installed successfully!"
        echo "  brains: {{.INSTALL_DIR}}/brains"
        echo "  bs:     {{.INSTALL_DIR}}/bs -> brains"
        echo ""
        {{.INSTALL_DIR}}/brains version

  test:
    desc: Run tests with coverage
    cmds:
      - task --taskfile Taskfile.dev.yml test

  up:
    desc: Start recall stack (PostgreSQL, importer, web GUI)
    cmds:
      - task --taskfile Taskfile.dev.yml recall:preflight
      - task: build
      - task --taskfile Taskfile.dev.yml db:up
      - task --taskfile Taskfile.dev.yml db:migrate
      - |
        echo "Starting recall stack..."
        echo "  PostgreSQL: localhost:${POSTGRES_PORT:-9432}"
        echo "  Ollama: ${BRAINS_OLLAMA_URL:-http://localhost:11434}"
        echo "  GUI: http://localhost:${WEBGUI_PORT:-9981}"
        echo ""

        # Start Claude importer in background
        echo "Starting Claude importer in background..."
        ./bin/brains recall watch claude --verbose &
        IMPORTER_PID=$!

        # Trap to kill importer on exit
        trap "echo 'Stopping importer...'; kill $IMPORTER_PID 2>/dev/null" EXIT INT TERM

        sleep 1

        echo "Starting web GUI..."
        ./bin/brains gui --port ${WEBGUI_PORT:-9981}

  down:
    desc: Stop all services
    cmds:
      - docker compose down

  gui:
    desc: Start web GUI only (requires db already running)
    cmds:
      - task --taskfile Taskfile.dev.yml recall:preflight
      - task: build
      - |
        echo "Starting web GUI..."
        echo "  GUI: http://localhost:${WEBGUI_PORT:-9981}"
        echo ""
        ./bin/brains gui --port ${WEBGUI_PORT:-9981}

  ci:
    desc: Run all CI checks (fmt, vet, lint, test, build)
    cmds:
      - task --taskfile Taskfile.dev.yml ci
