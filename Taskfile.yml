version: '3'

dotenv: ['.env']

tasks:
  default:
    desc: List available tasks
    silent: true
    cmds:
      - task --sort alphanumeric --list

  dev:
    desc: Run development tasks (use `task dev -- --list` to see all)
    cmds:
      - task --taskfile Taskfile.dev.yml {{.CLI_ARGS}}

  install:
    desc: Install brains CLI to GOBIN with bs symlink
    vars:
      INSTALL_DIR:
        sh: go env GOBIN || echo "$HOME/go/bin"
    cmds:
      - task --taskfile Taskfile.dev.yml build
      - |
        echo "Installing brains to {{.INSTALL_DIR}}..."
        mkdir -p {{.INSTALL_DIR}}
        if ! cp bin/brains {{.INSTALL_DIR}}/brains; then
          echo "ERROR: Failed to copy brains to {{.INSTALL_DIR}}"
          exit 1
        fi
        cd {{.INSTALL_DIR}} && ln -sf brains bs
        echo ""
        echo "Installed successfully!"
        echo "  brains: {{.INSTALL_DIR}}/brains"
        echo "  bs:     {{.INSTALL_DIR}}/bs -> brains"
        echo ""
        {{.INSTALL_DIR}}/brains version

  up:
    desc: Start ZombieKit stack
    cmds:
      - task --taskfile Taskfile.dev.yml recall:preflight
      - task --taskfile Taskfile.dev.yml build
      - task --taskfile Taskfile.dev.yml db:up
      - task --taskfile Taskfile.dev.yml db:migrate
      - |
        echo "Starting ZombieKit..."
        echo "  PostgreSQL: localhost:${POSTGRES_PORT:-9432}"
        echo "  Ollama: ${BRAINS_OLLAMA_URL:-http://localhost:11434}"
        echo "  GUI: http://localhost:${BRAINS_GUI_PORT:-9981}"
        echo ""
        ./bin/brains start

  orch:
    desc: Build and start the orchestrator daemon
    dotenv: ['.env.orchestrator']
    cmds:
      - task --taskfile Taskfile.dev.yml build:orchestrator
      - |
        echo "Starting orchestrator..."
        echo "  Callback: http://localhost:${ORCH_CALLBACK_PORT:-8666}"
        echo "  Poll interval: ${ORCH_POLL_INTERVAL:-30s}"
        echo "  Concurrency: ${ORCH_CONCURRENCY_LIMIT:-1}"
        echo "  Log level: ${ORCH_LOG_LEVEL:-info}"
        echo ""
        ./bin/orchestrator run

  down:
    desc: Stop all services
    cmds:
      - docker compose down
