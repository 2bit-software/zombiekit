version: '3'

dotenv: ['.env']

vars:
  VERSION:
    sh: git describe --tags --always --dirty 2>/dev/null || echo "dev"
  COMMIT:
    sh: git rev-parse --short HEAD 2>/dev/null || echo "unknown"
  BUILD_DATE:
    sh: date -u +%Y-%m-%dT%H:%M:%SZ
  VERSION_PKG: github.com/zombiekit/brains/internal/version
  LDFLAGS: -s -w -X {{.VERSION_PKG}}.version={{.VERSION}} -X {{.VERSION_PKG}}.commit={{.COMMIT}} -X {{.VERSION_PKG}}.buildDate={{.BUILD_DATE}}

tasks:
  default:
    desc: List available tasks
    silent: true
    cmds:
      - task --list

  dev:
    desc: Run development tasks. Use like `task dev -- <args>`
    cmds:
      - task --taskfile Taskfile.dev.yml {{.CLI_ARGS}}

  init:
    desc: Download dependencies and install development tools
    cmds:
      - go mod download
      - go mod tidy
      - task: init:golangci-lint

  setup:
    desc: Set up development environment (creates .env, checks dependencies)
    cmds:
      - task: setup:env
      - task: setup:check

  setup:env:
    desc: Create .env from .env.example if it doesn't exist
    silent: true
    status:
      - test -f .env
    cmds:
      - cp .env.example .env
      - echo "Created .env from .env.example"

  setup:check:
    desc: Check for required dependencies
    silent: true
    cmds:
      - |
        echo "Checking dependencies..."
        missing=""

        if ! command -v go &> /dev/null; then
          echo "  [MISSING] go - install from https://go.dev/dl/"
          missing="$missing go"
        else
          echo "  [OK] go $(go version | awk '{print $3}')"
        fi

        if ! command -v docker &> /dev/null; then
          echo "  [MISSING] docker - install from https://docs.docker.com/get-docker/"
          missing="$missing docker"
        else
          echo "  [OK] docker $(docker --version | awk '{print $3}' | tr -d ',')"
        fi

        if ! command -v ollama &> /dev/null; then
          echo "  [MISSING] ollama - install from https://ollama.ai (required for recall)"
          missing="$missing ollama"
        else
          echo "  [OK] ollama $(ollama --version 2>/dev/null | awk '{print $NF}' || echo 'installed')"
        fi

        echo ""
        if [ -n "$missing" ]; then
          echo "Some dependencies are missing. Install them to use all features."
          exit 0
        else
          echo "All dependencies installed."
        fi

  init:golangci-lint:
    internal: true
    desc: Install golangci-lint if not present
    status:
      - command -v golangci-lint
    cmds:
      - echo "Installing golangci-lint..."
      - go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest

  build:
    desc: Build the brains CLI binary
    cmds:
      - mkdir -p bin
      - go build -ldflags "{{.LDFLAGS}}" -o bin/brains ./cmd/brains
    sources:
      - "**/*.go"
      - go.mod
      - go.sum
    generates:
      - bin/brains

  install:
    desc: Build and install brains to GOBIN with bs symlink
    deps: [build]
    vars:
      INSTALL_DIR:
        sh: go env GOBIN || echo "$HOME/go/bin"
    cmds:
      - |
        echo "Installing brains to {{.INSTALL_DIR}}..."
        mkdir -p {{.INSTALL_DIR}}
        if ! cp bin/brains {{.INSTALL_DIR}}/brains; then
          echo "ERROR: Failed to copy brains to {{.INSTALL_DIR}}"
          exit 1
        fi
        cd {{.INSTALL_DIR}} && ln -sf brains bs
        echo ""
        echo "Installed successfully!"
        echo "  brains: {{.INSTALL_DIR}}/brains"
        echo "  bs:     {{.INSTALL_DIR}}/bs -> brains"
        echo ""
        {{.INSTALL_DIR}}/brains version

  test:
    desc: Run tests with coverage
    cmds:
      - task --taskfile Taskfile.dev.yml test

  up:
    desc: Start PostgreSQL database container
    cmds:
      - docker compose up -d postgres
      - echo "Waiting for PostgreSQL to be ready..."
      - |
        for i in $(seq 1 30); do
          if docker compose exec -T postgres pg_isready -U ${POSTGRES_USER:-brains} -d ${POSTGRES_DB:-brains} > /dev/null 2>&1; then
            echo "PostgreSQL is ready on port ${POSTGRES_PORT:-9432}"
            exit 0
          fi
          sleep 1
        done
        echo "Timeout waiting for PostgreSQL"
        exit 1

  down:
    desc: Stop and remove PostgreSQL container
    cmds:
      - docker compose down

  recall:watch:claude:
    desc: Watch and import Claude Code conversation history
    deps: [build]
    cmds:
      - |
        echo "Starting Claude conversation importer..."
        echo "  PostgreSQL: localhost:${POSTGRES_PORT:-9432}"
        echo "  Ollama: ${BRAINS_OLLAMA_URL:-http://localhost:11434}"
        echo ""
        ./bin/brains recall watch claude --verbose

  recall:import:claude:
    desc: Import Claude Code conversation history once (no watch)
    deps: [build]
    cmds:
      - |
        echo "Importing Claude conversations..."
        ./bin/brains recall watch claude --once --verbose

  ci:
    desc: Run all CI checks (fmt, vet, lint, test, build)
    cmds:
      - task --taskfile Taskfile.dev.yml ci
