run:
  timeout: 5m
  modules-download-mode: readonly

linters:
  enable:
    - errcheck
    - gofmt
    - goimports
    - govet
    - staticcheck
    - unused
    - misspell
    - gosec
    - unparam
    - ineffassign
    - typecheck

linters-settings:
  gofmt:
    simplify: true
  goimports:
    local-prefixes: github.com/2bit-software/zombiekit
  gosec:
    excludes:
      - G104  # Unhandled errors (too noisy)
  misspell:
    locale: US

issues:
  exclude-rules:
    # Exclude gosec from test files
    - path: _test\.go
      linters:
        - gosec
        - unparam
    # Exclude some linters from main.go
    - path: main\.go
      linters:
        - unparam
  max-issues-per-linter: 50
  max-same-issues: 10
