<!DOCTYPE html>
<html lang="en" class="h-full bg-gray-100">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{if .Title}}{{.Title}} - {{end}}Brains</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <link rel="stylesheet" href="/static/css/app.css">
</head>
<body class="h-full">
    <div class="flex h-full">
        <!-- Sidebar -->
        <aside class="w-64 bg-gray-800 text-white flex flex-col">
            <div class="p-4 border-b border-gray-700">
                <a href="/" class="text-xl font-bold">Brains</a>
            </div>
            <nav class="flex-1 p-4 space-y-1">
                {{if .SidebarItems}}
                    {{range .SidebarItems}}
                    <a href="{{.Path}}"
                       hx-get="{{.Path}}"
                       hx-target="#content"
                       hx-push-url="true"
                       class="sidebar-link block px-3 py-2 rounded-md text-sm font-medium {{if isActive $.ActivePath .Path}}bg-gray-900 text-white{{else}}text-gray-300 hover:bg-gray-700 hover:text-white{{end}}">
                        {{.Label}}
                        {{if .Badge}}
                        <span class="ml-2 inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-gray-700">
                            {{.Badge}}
                        </span>
                        {{end}}
                    </a>
                    {{end}}
                {{else}}
                <p class="text-gray-400 text-sm px-3 py-2">No plugins registered</p>
                {{end}}
            </nav>
        </aside>

        <!-- Main content area -->
        <div class="flex-1 flex flex-col overflow-hidden">
            <!-- Header with search bar -->
            <header class="bg-white shadow-sm border-b border-gray-200 px-4 py-3">
                <div id="search-container" class="relative max-w-md">
                    <div class="relative">
                        <input type="text"
                               id="search-input"
                               name="q"
                               placeholder="Search... (press / to focus)"
                               autocomplete="off"
                               hx-get="/search"
                               hx-trigger="keyup changed delay:300ms"
                               hx-target="#search-results"
                               hx-indicator="#search-loading"
                               class="w-full px-4 py-2 pr-10 text-sm border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                        <div id="search-loading" class="htmx-indicator absolute right-3 top-1/2 transform -translate-y-1/2">
                            <svg class="animate-spin h-4 w-4 text-gray-400" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                            </svg>
                        </div>
                    </div>
                    <div id="search-results" class="absolute w-full z-50 bg-white shadow-lg rounded-md mt-1 max-h-96 overflow-y-auto"></div>
                </div>
            </header>

            <!-- Main content -->
            <main class="flex-1 overflow-y-auto">
                <div id="content" class="p-8">
                    {{.RenderedContent}}
                </div>
            </main>
        </div>
    </div>
    <script src="/static/js/app.js"></script>
</body>
</html>
