<!DOCTYPE html>
<html lang="en" class="h-full bg-gray-100">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{if .Title}}{{.Title}} - {{end}}Brains</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <link rel="stylesheet" href="/static/css/app.css">
</head>
<body class="h-full">
    <div class="flex h-full">
        <!-- Sidebar -->
        <aside class="w-64 bg-gray-800 text-white flex flex-col">
            <div class="p-4 border-b border-gray-700">
                <a href="/" class="text-xl font-bold">Brains</a>
            </div>
            <nav class="flex-1 p-4 space-y-1">
                {{if .SidebarItems}}
                    {{range .SidebarItems}}
                    <a href="{{.Path}}"
                       hx-get="{{.Path}}"
                       hx-target="#content"
                       hx-push-url="true"
                       class="sidebar-link block px-3 py-2 rounded-md text-sm font-medium {{if isActive $.ActivePath .Path}}bg-gray-900 text-white{{else}}text-gray-300 hover:bg-gray-700 hover:text-white{{end}}">
                        {{.Label}}
                        {{if .Badge}}
                        <span class="ml-2 inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-gray-700">
                            {{.Badge}}
                        </span>
                        {{end}}
                    </a>
                    {{end}}
                {{else}}
                <p class="text-gray-400 text-sm px-3 py-2">No plugins registered</p>
                {{end}}
            </nav>
        </aside>

        <!-- Main content -->
        <main class="flex-1 overflow-y-auto">
            <div id="content" class="p-8">
                {{.RenderedContent}}
            </div>
        </main>
    </div>
    <script src="/static/js/app.js"></script>
</body>
</html>
