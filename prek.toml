# Configuration file for `prek`, a git hook framework written in Rust.
# See https://prek.j178.dev for more information.
#:schema https://www.schemastore.org/prek.json

# --- Built-in hooks (language-agnostic) ---
[[repos]]
repo = "builtin"
hooks = [
    { id = "trailing-whitespace" },
    { id = "end-of-file-fixer" },
    { id = "check-added-large-files", args = ["--maxkb=500"] },
    { id = "check-merge-conflict" },
    { id = "check-toml" },
    { id = "check-yaml" },
    { id = "check-json" },
    { id = "detect-private-key" },
]

# --- Go: formatting and static analysis ---
[[repos]]
repo = "https://github.com/dnephin/pre-commit-golang"
rev = "v0.5.1"
hooks = [
    { id = "go-fmt" },
    { id = "go-vet" },
    { id = "go-build", stages = ["pre-push"] },
]

# --- Go: linting via golangci-lint ---
[[repos]]
repo = "https://github.com/golangci/golangci-lint"
rev = "v2.1.6"
hooks = [
    { id = "golangci-lint" },
]

# --- Sentrux: structural quality gate ---
[[repos]]
repo = "local"
hooks = [
    { id = "sentrux-check", name = "sentrux check", language = "system", entry = "sentrux check .", pass_filenames = false, always_run = true, stages = ["pre-push"] },
    { id = "sentrux-gate", name = "sentrux gate", language = "system", entry = "sentrux gate .", pass_filenames = false, always_run = true, stages = ["manual"] },
]
