services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: brains-postgres
    environment:
      POSTGRES_USER: brains
      POSTGRES_PASSWORD: brains_dev
      POSTGRES_DB: brains
    ports:
      - "9432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U brains -d brains"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
