version: '3'

dotenv: ['.env']

vars:
  VERSION:
    sh: git describe --tags --always --dirty 2>/dev/null || echo "dev"
  COMMIT:
    sh: git rev-parse --short HEAD 2>/dev/null || echo "unknown"
  BUILD_DATE:
    sh: date -u +%Y-%m-%dT%H:%M:%SZ
  VERSION_PKG: github.com/zombiekit/brains/internal/version
  LDFLAGS: -s -w -X {{.VERSION_PKG}}.version={{.VERSION}} -X {{.VERSION_PKG}}.commit={{.COMMIT}} -X {{.VERSION_PKG}}.buildDate={{.BUILD_DATE}}

tasks:
  default:
    desc: List development tasks
    silent: true
    cmds:
      - task --taskfile Taskfile.dev.yml --sort alphanumeric --list

  # === Setup ===

  setup:
    desc: Set up development environment (creates .env, installs tools)
    cmds:
      - task: setup:env
      - task: setup:check
      - task: init

  setup:env:
    desc: Create .env from .env.example if missing
    silent: true
    status:
      - test -f .env
    cmds:
      - cp .env.example .env
      - echo "Created .env from .env.example"

  setup:check:
    desc: Check for required dependencies
    silent: true
    cmds:
      - |
        echo "Checking dependencies..."
        missing=""

        if ! command -v go &> /dev/null; then
          echo "  [MISSING] go - install from https://go.dev/dl/"
          missing="$missing go"
        else
          echo "  [OK] go $(go version | awk '{print $3}')"
        fi

        if ! command -v docker &> /dev/null; then
          echo "  [MISSING] docker - install from https://docs.docker.com/get-docker/"
          missing="$missing docker"
        else
          echo "  [OK] docker $(docker --version | awk '{print $3}' | tr -d ',')"
        fi

        if ! command -v ollama &> /dev/null; then
          echo "  [MISSING] ollama - install from https://ollama.ai (required for recall)"
          missing="$missing ollama"
        else
          echo "  [OK] ollama $(ollama --version 2>/dev/null | awk '{print $NF}' || echo 'installed')"
        fi

        if ! command -v buf &> /dev/null; then
          echo "  [MISSING] buf - will be installed by 'task init'"
        else
          echo "  [OK] buf $(buf --version 2>/dev/null || echo 'installed')"
        fi

        echo ""
        if [ -n "$missing" ]; then
          echo "Some dependencies are missing. Install them to use all features."
          exit 0
        else
          echo "All dependencies installed."
        fi

  init:
    desc: Download Go dependencies and install dev tools
    cmds:
      - go mod download
      - go mod tidy
      - task: init:golangci-lint
      - task: init:buf
      - task: init:protoc-gen-go
      - task: init:protoc-gen-connect-go

  init:golangci-lint:
    desc: Install golangci-lint if not present
    internal: true
    status:
      - command -v golangci-lint
    cmds:
      - echo "Installing golangci-lint..."
      - go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest

  init:buf:
    desc: Install buf CLI if not present
    internal: true
    status:
      - command -v buf
    cmds:
      - echo "Installing buf..."
      - go install github.com/bufbuild/buf/cmd/buf@latest

  init:protoc-gen-go:
    desc: Install protoc-gen-go if not present
    internal: true
    status:
      - command -v protoc-gen-go
    cmds:
      - echo "Installing protoc-gen-go..."
      - go install google.golang.org/protobuf/cmd/protoc-gen-go@latest

  init:protoc-gen-connect-go:
    desc: Install protoc-gen-connect-go if not present
    internal: true
    status:
      - command -v protoc-gen-connect-go
    cmds:
      - echo "Installing protoc-gen-connect-go..."
      - go install connectrpc.com/connect/cmd/protoc-gen-connect-go@latest

  # === Build ===

  build:
    desc: Build the brains CLI binary
    cmds:
      - mkdir -p bin
      - go build -ldflags "{{.LDFLAGS}}" -o bin/brains ./cmd/brains
    sources:
      - "**/*.go"
      - go.mod
      - go.sum
    generates:
      - bin/brains

  # === Proto ===

  proto:
    desc: Generate Go code from proto files
    cmds:
      - buf generate
    sources:
      - proto/**/*.proto
      - buf.yaml
      - buf.gen.yaml
    generates:
      - gen/**/*.go

  proto:lint:
    desc: Lint proto files
    cmds:
      - buf lint

  proto:breaking:
    desc: Check for breaking changes against git HEAD
    cmds:
      - buf breaking --against '.git#branch=main'

  proto:clean:
    desc: Remove generated proto files
    cmds:
      - rm -rf gen/

  # === Quality ===

  test:
    desc: Run tests with coverage
    cmds:
      - go test -v -race -coverprofile=coverage.out ./...
    sources:
      - "**/*.go"
    generates:
      - coverage.out

  ci:
    desc: Run all CI checks (fmt, vet, lint, proto:lint, test, build)
    cmds:
      - task: fmt
      - task: vet
      - task: lint
      - task: proto:lint
      - task: test
      - task: build

  fmt:
    desc: Format Go code
    cmds:
      - go fmt ./...

  vet:
    desc: Run go vet
    cmds:
      - go vet ./...

  lint:
    desc: Run golangci-lint
    cmds:
      - golangci-lint run --config configs/.golangci.yml ./...

  # === Database ===

  db:up:
    desc: Start PostgreSQL container
    cmds:
      - docker compose up -d postgres
      - echo "Waiting for PostgreSQL to be ready..."
      - |
        for i in $(seq 1 30); do
          if docker compose exec -T postgres pg_isready -U ${POSTGRES_USER:-brains} -d ${POSTGRES_DB:-brains} > /dev/null 2>&1; then
            echo "PostgreSQL is ready on port ${POSTGRES_PORT:-9432}"
            exit 0
          fi
          sleep 1
        done
        echo "Timeout waiting for PostgreSQL"
        exit 1

  db:migrate:
    desc: Run database migrations
    silent: true
    cmds:
      - |
        echo "Running database migrations..."
        for f in internal/database/migrations/postgres/*.sql; do
          echo "  Applying $(basename $f)..."
          docker compose exec -T postgres psql -U ${POSTGRES_USER:-brains} -d ${POSTGRES_DB:-brains} -f /dev/stdin < "$f" 2>&1 | grep -v "already exists\|NOTICE" || true
        done
        echo "Migrations complete."

  # === Recall ===

  recall:reset:
    desc: Wipe all recall data (keeps sticky memories)
    prompt: This will delete all recall chunks and import state. Continue?
    cmds:
      - |
        echo "Truncating recall tables..."
        docker compose exec -T postgres psql -U ${POSTGRES_USER:-brains} -d ${POSTGRES_DB:-brains} <<'SQL'
        TRUNCATE TABLE recall_chunks CASCADE;
        TRUNCATE TABLE recall_import_state CASCADE;
        SQL
        echo "Recall data wiped. Import state reset."

  recall:preflight:
    desc: Check recall dependencies (docker, ollama)
    silent: true
    cmds:
      - |
        # Check Docker is running
        if ! docker info > /dev/null 2>&1; then
          echo "ERROR: Docker is not running"
          echo ""
          echo "Start Docker Desktop or OrbStack, then try again."
          exit 1
        fi

        # Check Ollama is running
        ollama_url="${BRAINS_OLLAMA_URL:-http://localhost:11434}"
        if ! curl -s --max-time 2 "$ollama_url/api/tags" > /dev/null 2>&1; then
          echo "ERROR: Ollama is not running at $ollama_url"
          echo ""
          echo "Start Ollama with: ollama serve"
          echo "Then pull the model: ollama pull nomic-embed-text"
          exit 1
        fi

        # Check embedding model is available
        if ! curl -s "$ollama_url/api/tags" | grep -q "nomic-embed-text"; then
          echo "WARNING: Embedding model 'nomic-embed-text' not found"
          echo "Pull it with: ollama pull nomic-embed-text"
          exit 1
        fi

        echo "Preflight checks passed."

  recall:watch:
    desc: Watch and import Claude conversation history
    cmds:
      - task: recall:preflight
      - task: build
      - task: db:up
      - task: db:migrate
      - |
        echo "Starting Claude conversation importer..."
        echo "  PostgreSQL: localhost:${POSTGRES_PORT:-9432}"
        echo "  Ollama: ${BRAINS_OLLAMA_URL:-http://localhost:11434}"
        echo ""
        ./bin/brains recall watch claude --verbose

  recall:import:
    desc: Import Claude conversation history once (no watch)
    cmds:
      - task: recall:preflight
      - task: build
      - task: db:up
      - task: db:migrate
      - |
        echo "Importing Claude conversations..."
        ./bin/brains recall watch claude --once --verbose

  recall:demo:
    desc: Demo recall feature with sample data
    cmds:
      - ./bin/brains recall save "The deployment failed due to memory limits"
      - ./bin/brains recall save "CSS styling updated for login page"
      - ./bin/brains recall save "Database connection pool exhausted"
      - echo ""
      - echo "=== List all chunks ==="
      - ./bin/brains recall list
      - echo ""
      - echo "=== Search for memory-related issues ==="
      - ./bin/brains recall search "memory problems"

  # === GUI ===

  gui:
    desc: Start web GUI (requires db already running)
    cmds:
      - task: recall:preflight
      - task: build
      - |
        echo "Starting web GUI..."
        echo "  GUI: http://localhost:${WEBGUI_PORT:-9981}"
        echo ""
        ./bin/brains gui --port ${WEBGUI_PORT:-9981}

  gui:dev:
    desc: Start web GUI in development mode with hot-reloading
    cmds:
      - docker compose up --build webgui-dev

  # === Ollama ===

  ollama:pull:
    desc: Pull required embedding model for recall
    cmds:
      - ollama pull nomic-embed-text
      - echo "Model nomic-embed-text ready for recall embeddings"
